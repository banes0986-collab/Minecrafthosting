<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyNW | Yönetim & Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --gold: #f1c40f; --text: #c9d1d9;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); }

        /* Giriş Ekranı */
        #login-screen {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #0d1117, #161b22);
        }
        .login-box {
            background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid #30363d;
            width: 100%; max-width: 400px; text-align: center;
        }
        .login-box h2 { margin-bottom: 20px; color: var(--gold); }
        input {
            width: 100%; padding: 12px; margin: 10px 0; background: #010409;
            border: 1px solid #30363d; color: white; border-radius: 8px;
        }
        .btn {
            width: 100%; padding: 12px; background: var(--accent); border: none;
            color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; }

        /* Dashboard Alanı (Başlangıçta Gizli) */
        #dashboard { display: none; padding-top: 70px; }
        
        /* Navbar */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 60px; background: var(--card);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
            border-bottom: 1px solid #30363d; z-index: 100;
        }

        /* Sidebar Menü */
        .sidebar {
            position: fixed; left: 0; top: 60px; width: 250px; height: 100%;
            background: var(--card); border-right: 1px solid #30363d; padding: 20px;
        }
        .sidebar a {
            display: block; padding: 15px; color: var(--text); text-decoration: none;
            margin-bottom: 10px; border-radius: 8px; transition: 0.3s;
        }
        .sidebar a:hover { background: #21262d; color: var(--accent); }

        /* İçerik Kartları */
        .main-content { margin-left: 270px; padding: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        .stat-card h4 { color: #8b949e; font-size: 0.9rem; }
        .stat-card .val { font-size: 1.8rem; font-weight: 800; color: var(--gold); }

        /* Ticket & Rank Formları */
        .form-section { background: var(--card); padding: 30px; border-radius: 12px; margin-top: 30px; border: 1px solid #30363d; }
        .form-section h3 { margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 10px; }

        /* Gizleme/Gösterme sınıfları */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>LegacyNW Giriş</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button class="btn" onclick="checkLogin()">Giriş Yap</button>
        </div>
    </div>

    <div id="dashboard">
        <nav class="navbar">
            <div style="font-weight: 800; color: var(--gold);">LEGACY NW | PANEL</div>
            <div id="user-info">Hoş geldin, <span id="display-name"></span></div>
        </nav>

        <div class="sidebar">
            <a href="#" onclick="showPage('ana')"><i class="fas fa-home"></i> Panel Ana Sayfa</a>
            <a href="#" onclick="showPage('rank-ver')"><i class="fas fa-crown"></i> Rank Yönetimi</a>
            <a href="#" onclick="showPage('ticket')"><i class="fas fa-ticket"></i> Ticket Sistemi</a>
            <a href="#" onclick="addBalance()"><i class="fas fa-wallet"></i> Bakiye Yükle</a>
            <a href="index.html" style="color: #f85149;"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</a>
        </div>

        <div class="main-content">
            <div id="page-ana">
                <div class="stats-grid">
                    <div class="stat-card"><h4>Mevcut Bakiyen</h4><div class="val" id="balance-val">0 TL</div></div>
                    <div class="stat-card"><h4>Rank Durumu</h4><div class="val" style="color:var(--accent)">KURUCU</div></div>
                    <div class="stat-card"><h4>Aktif Ticket</h4><div class="val">0</div></div>
                </div>
            </div>

            <div id="page-rank-ver" class="hidden">
                <div class="form-section">
                    <h3>Oyuncuya Rank Ver</h3>
                    <input type="text" id="player-name" placeholder="Oyuncu Adı">
                    <select id="rank-select" style="width: 100%; padding: 12px; background: #010409; color: white; border-radius: 8px; border: 1px solid #30363d;">
                        <option value="VIP">VIP</option>
                        <option value="VIP+">VIP+</option>
                        <option value="LVIP">LVIP</option>
                        <option value="LVIP+">LVIP+</option>
                    </select>
                    <button class="btn" style="margin-top: 20px; background: #238636;" onclick="giveRank()">Rankı Tanımla</button>
                </div>
            </div>

            <div id="page-ticket" class="hidden">
                <div class="form-section">
                    <h3>Destek Talebi (Ticket)</h3>
                    <input type="text" id="t-subject" placeholder="Konu">
                    <textarea id="t-msg" rows="5" placeholder="Mesajınız..." style="width: 100%; background: #010409; border: 1px solid #30363d; color: white; border-radius: 8px; padding: 10px;"></textarea>
                    <button class="btn" onclick="sendTicket()">Talebi Oluştur</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Giriş Kontrolü
        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if(u === "triggerbabaa" && p === "resul3163") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('display-name').innerText = u;
            } else {
                alert("Hatalı kullanıcı adı veya şifre kanka!");
            }
        }

        // Sayfa Değiştirme
        function showPage(pageId) {
            document.getElementById('page-ana').classList.add('hidden');
            document.getElementById('page-rank-ver').classList.add('hidden');
            document.getElementById('page-ticket').classList.add('hidden');
            document.getElementById('page-' + pageId).classList.remove('hidden');
        }

        // Bakiye Sistemi (Discord Yönlendirme)
        function addBalance() {
            alert("Bakiye artırmak için Discord üzerinden talep açmalısınız! Yönlendiriliyorsunuz...");
            window.location.href = "https://discord.gg/EagYzrV4N";
        }

        // Rank Verme Simülasyonu
        function giveRank() {
            const pName = document.getElementById('player-name').value;
            const rank = document.getElementById('rank-select').value;
            if(pName) {
                alert(pName + " isimli oyuncuya " + rank + " rankı başarıyla verildi!");
            } else {
                alert("Oyuncu adı gir kanka!");
            }
        }

        // Ticket Gönderme
        function sendTicket() {
            const sub = document.getElementById('t-subject').value;
            const msg = document.getElementById('t-msg').value;
            if(sub && msg) {
                alert("Ticket başarıyla oluşturuldu! Yetkililer en kısa sürede Discord üzerinden veya buradan dönecektir.");
                document.getElementById('t-subject').value = "";
                document.getElementById('t-msg').value = "";
            } else {
                alert("Boş alan bırakma kanka!");
            }
        }
    </script>
</body>
</html>
