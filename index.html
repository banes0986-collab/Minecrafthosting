<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyPvP | BoxMining Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navigasyon Çubuğu -->
    <nav>
        <div class="logo">Legacy<span>PvP</span></div>
        <div class="menu-icon" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <ul id="nav-links">
            <li><a href="#" onclick="showSection('home')">Anasayfa</a></li>
            <li><a href="#" onclick="showSection('register')">Kayıt Ol</a></li>
            <li><a href="#" onclick="showSection('shop')">Mağaza</a></li>
        </ul>
    </nav>

    <!-- Yan Menü (Kategoriler) -->
    <div id="side-panel" class="side-panel">
        <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">&times;</a>
        <h3>Kategoriler</h3>
        <button onclick="filterShop('vips')"><i class="fas fa-crown"></i> VIP Paketleri</button>
        <button onclick="filterShop('kits')"><i class="fas fa-shield-alt"></i> Kitler</button>
        <button onclick="filterShop('swords')"><i class="fas fa-gavel"></i> Özel Kılıçlar</button>
        <button onclick="filterShop('crates')"><i class="fas fa-box"></i> Kasalar</button>
    </div>

    <div class="container">
        <!-- Kayıt Bölümü -->
        <section id="register" class="content-section">
            <div class="card">
                <h2><i class="fas fa-user-plus"></i> Sunucuya Kayıt Ol</h2>
                <p>Oyundaki isminiz ve şifrenizle eşleşmelidir.</p>
                <form id="regForm">
                    <input type="text" placeholder="Minecraft Kullanıcı Adı (Örn: triggerbabaa)" required>
                    <input type="password" placeholder="Şifre (Örn: resul123)" required>
                    <button type="submit" class="btn-main">Kayıt İşlemini Tamamla</button>
                </form>
            </div>
        </section>

        <!-- Mağaza Bölümü -->
        <section id="shop" class="content-section active">
            <div class="server-info">
                <p>IP Adresi: <strong>89.47.113.47:25573</strong></p>
            </div>

            <div id="shop-items" class="grid-container">
                <!-- Ürünler JS ile buraya gelecek -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
