<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyNetwork | Neon Pink & Green Supreme</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        /* Temel Ayarlar */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #1a001a 0%, #001a0d 100%); color: #ffffff; overflow-x: hidden; min-height: 100vh; }

        /* Sol Alt Sabit Rütbe Kutusu */
        .floating-rank { position: fixed; left: 20px; bottom: 20px; background: rgba(10, 2, 10, 0.85); border: 2px solid #ff1493; padding: 15px 25px; border-radius: 12px; z-index: 1000; box-shadow: 0 0 20px rgba(255, 20, 147, 0.3); }
        .floating-rank span.title { color: #aaa; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }

        /* Navigasyon */
        nav { background: rgba(15, 5, 15, 0.85); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff1493; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 900; color: #00ff7f; text-transform: uppercase; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; }
        .admin-btn { background: transparent; color: #00ff7f; border: 1px solid #00ff7f; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* Bölümler */
        .section { display: none; padding: 60px 20px; text-align: center; min-height: 80vh; }
        .active-section { display: block; }
        h1 { color: #ff1493; margin-bottom: 30px; font-size: 3rem; text-transform: uppercase; }

        /* Mağaza Tasarımı */
        .store-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 30px; }
        .vip-card { background: rgba(10, 2, 10, 0.8); border: 2px solid #333; padding: 30px; border-radius: 15px; width: 220px; transition: 0.3s; }
        .vip-card:hover { border-color: #00ff7f; }
        .price { font-size: 2rem; font-weight: 900; margin: 15px 0; }
        .vip-card button { background: transparent; color: #ff1493; border: 2px solid #ff1493; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: 900; }
        .vip-card button:hover { background: #ff1493; color: #fff; }

        /* Rank Badge */
        .rank-badge { display: inline-block; padding: 5px 12px; border-radius: 4px; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; }
        .rank-Kurucu { background: #ff1493; color: #fff; }
        .rank-VIP { background: #00ff7f; color: #000; }
        .rank-Oyuncu { background: #4b5563; color: #fff; }
        
        /* Diğerleri */
        .admin-box { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="floating-rank">
        <span class="title">Sistem Rütben</span>
        <span class="rank-badge rank-Oyuncu" id="display-rank">Oyuncu</span>
    </div>

    <nav>
        <div class="logo">LegacyNetwork</div>
        <div class="nav-links">
            <a onclick="showSection('home')">Ana Sayfa</a>
            <a onclick="showSection('store')">Mağaza</a>
            <a onclick="showSection('admin-panel')" id="admin-nav-link" style="display: none; color: #00ff7f;">[PANEL]</a>
        </div>
        <button class="admin-btn" id="auth-action-btn" onclick="handleAdminNav()">Admin Girişi</button>
    </nav>

    <div id="home" class="section active-section">
        <h1>LegacyNetwork</h1>
        <p>Aktif Oyuncu: <span id="player-count">Yükleniyor...</span></p>
    </div>

    <div id="store" class="section">
        <h1>VIP Mağazası</h1>
        <div class="store-container">
            <div class="vip-card"><h3>VIP</h3><div class="price">30 TL</div><button>Satın Al</button></div>
            <div class="vip-card"><h3>VIP+</h3><div class="price">50 TL</div><button>Satın Al</button></div>
        </div>
    </div>

    <div id="admin-panel" class="section">
        <h1>Yönetim Masası</h1>
        <div class="admin-box">
            <h3>Aktif Oyuncular</h3>
            <ul id="live-players-ul" style="list-style: none; margin: 15px 0;"></ul>
            <hr style="margin: 20px 0;">
            <h3>Rütbe Değiştir</h3>
            <select id="rank-selector" onchange="changeMyRank(this.value)" style="padding: 10px; width: 100%;">
                <option value="Oyuncu">Oyuncu</option><option value="VIP">VIP</option><option value="Kurucu">Kurucu</option>
            </select>
        </div>
    </div>

    <div id="admin-auth" class="section">
        <h1>Yönetici Doğrulaması</h1>
        <div class="admin-box">
            <input type="text" id="admin-username-input" placeholder="Kullanıcı Adı" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="password" id="admin-password-input" placeholder="Şifre" style="width:100%; padding:10px; margin-bottom:10px;">
            <button onclick="checkAdminLogin()" style="width:100%; padding:10px; background:#ff1493; border:none; color:white;">Giriş Yap</button>
        </div>
    </div>

    <script>
        // Rütbe Yönetimi
        let savedRank = localStorage.getItem('myLegacyRank') || "Oyuncu";
        document.getElementById('display-rank').innerText = savedRank;
        document.getElementById('display-rank').className = "rank-badge rank-" + savedRank;

        function changeMyRank(newRank) {
            localStorage.setItem('myLegacyRank', newRank);
            document.getElementById('display-rank').innerText = newRank;
            document.getElementById('display-rank').className = "rank-badge rank-" + newRank;
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'home' || id === 'admin-panel') fetchStatus();
        }

        function fetchStatus() {
            fetch('https://api.mcsrvstat.us/2/legacynw.craftmc.com.tr')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('player-count').innerText = data.players.online + " / " + data.players.max;
                    if(data.players.list) {
                        document.getElementById('live-players-ul').innerHTML = data.players.list.map(p => `<li>🎮 ${p}</li>`).join('');
                    }
                });
        }

        function checkAdminLogin() {
            let u = document.getElementById('admin-username-input').value;
            let p = document.getElementById('admin-password-input').value;
            // Google uyarısı almamak için şifreyi LegacyAdmin2026! yapmanı öneririm
            if(u === "Admin" && p === "LegacyAdmin2026!") {
                document.getElementById('admin-nav-link').style.display = 'inline-block';
                document.getElementById('auth-action-btn').innerText = "Çıkış";
                showSection('admin-panel');
            } else { alert("Hatalı Giriş!"); }
        }

        function handleAdminNav() { location.reload(); }
        fetchStatus();
    </script>
</body>
</html>
