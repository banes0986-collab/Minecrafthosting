<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyNW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 30px;
            border-radius: 12px;
            background: #1e1e1e;

            border: 1px solid #333;
        }
        h1 {
            color: #00ffff;
            margin-bottom: 15px;
        }
        p {
            color: #b3b3b3;
            font-size: 1.1rem;
        }

</head>

    <div class="container">
        <h1>Sistem Aktif! 🚀</h1>
