<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LegacyNW | Giriş Yap</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div id="auth-container">
        <div class="auth-box">
            <h1 class="logo-main">LEGACY<span>NW</span></h1>
            <div class="auth-tabs">
                <button id="login-tab" class="active" onclick="switchAuth('login')">Giriş</button>
                <button id="register-tab" onclick="switchAuth('register')">Kayıt</button>
            </div>
            
            <div id="login-form">
                <input type="text" id="l-user" placeholder="Kullanıcı Adı">
                <input type="password" id="l-pass" placeholder="Şifre">
                <button class="btn-primary" onclick="handleLogin()">Giriş Yap</button>
            </div>

            <div id="register-form" class="hidden">
                <input type="text" id="r-user" placeholder="Kullanıcı Adı Seç">
                <input type="password" id="r-pass" placeholder="Şifre Belirle">
                <button class="btn-success" onclick="handleRegister()">Hesap Oluştur</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
