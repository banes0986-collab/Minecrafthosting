<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyPvP | BoxMining</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Hareketli Arka Plan Efekti -->
    <div class="bg-animate"></div>

    <!-- Navigasyon -->
    <nav>
        <div class="menu-btn" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </div>
        <div class="logo">BOX<span>MINING</span></div>
        <div class="server-status">IP: 89.47.113.47:25573</div>
    </nav>

    <!-- Yan Menü (Sidebar) -->
    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleSidebar()">&times;</a>
        <div class="sidebar-content">
            <h3>MARKET</h3>
            <button onclick="showCategory('vips')"><i class="fas fa-crown"></i> VIP Paketleri</button>
            <button onclick="showCategory('kits')"><i class="fas fa-shield-alt"></i> Kitler</button>
            <button onclick="showCategory('swords')"><i class="fas fa-khanda"></i> Kılıçlar</button>
            <button onclick="showCategory('crates')"><i class="fas fa-box-open"></i> Kasalar</button>
        </div>
    </div>

    <main class="container">
        <!-- Kayıt Kartı -->
        <section class="glass-card register-section">
            <h2><i class="fas fa-user-plus"></i> Sunucuya Kayıt</h2>
            <p>Oyundaki isminiz ve şifreniz ile aynı olmalıdır!</p>
            <div class="input-group">
                <input type="text" placeholder="Kullanıcı Adı (Örn: triggerbabaa)" id="mc-user">
                <input type="password" placeholder="Şifre (Örn: resul123)" id="mc-pass">
                <button class="neon-btn">HESABI BAĞLA</button>
            </div>
        </section>

        <!-- Market Alanı -->
        <div id="shop-display" class="shop-grid">
            <!-- Ürünler buraya sihirli bir şekilde gelecek -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
